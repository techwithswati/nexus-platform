name: CI/CD Pipeline


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test-and-build:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'


    - name: Install dependencies
      run: |
        cd applications/sample-microservice
        pip install -r requirements.txt


    - name: Run tests with pytest
      run: |
        cd applications/sample-microservice
        pytest tests/ -v


    - name: Build Docker image
      run: |
        cd applications/sample-microservice
        docker build -t sample-microservice:${{ github.sha }} .



    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag sample-microservice:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/sample-microservice:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/sample-microservice:latest

