name: CI/CD Pipeline


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test-and-build:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'


    - name: Install dependencies
      run: |
        cd applications/sample-microservice
        pip install -r requirements.txt


    - name: Run tests (placeholder)
      run: |
        cd applications/sample-microservice
        echo "No tests yet - add them in tests/ folder"
        # Later you can run: pytest tests/


    - name: Build Docker image
      run: |
        cd applications/sample-microservice
        docker build -t sample-microservice:${{ github.sha }} .
